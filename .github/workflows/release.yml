name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Optional custom version (e.g. 1.2.3). If omitted, uses auto-increment and timestamp.
        required: false
        type: string

concurrency:
  group: release-${{ github.ref_name || inputs.version }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  version:
    name: Validate and bump version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      tag_name: ${{ steps.version.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate and bump version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(grep '^andy.versionName=' gradle.properties | cut -d'=' -f2- | tr -d '[:space:]')"
          configured_version_code="$(grep '^andy.versionCode=' gradle.properties | cut -d'=' -f2- | tr -d '[:space:]' || true)"

          if [[ -z "${current_version}" ]]; then
            echo "::error::gradle.properties must define andy.versionName"
            exit 1
          fi
          if [[ -z "${configured_version_code}" ]]; then
            echo "::error::gradle.properties must define andy.versionCode"
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            new_version_name="${{ inputs.version }}"
            new_version_code=$((configured_version_code + 1))
          else
            new_version_code=$((configured_version_code + 1))
            new_version_name=$(date -u +"%Y.%m%d.%H%M")
          fi

          if [[ ! "${new_version_name}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release version name must be plain semver (like 1.2.3 or YYYY.MMDD.HHMM)"
            exit 1
          fi

          echo "Bumping version code from ${configured_version_code} to ${new_version_code}"
          echo "Bumping version name from ${current_version} to ${new_version_name}"

          perl -pi -e "s/^andy.versionCode=.*/andy.versionCode=${new_version_code}/" gradle.properties
          perl -pi -e "s/^andy.versionName=.*/andy.versionName=${new_version_name}/" gradle.properties

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add gradle.properties
          git commit -m "Bump version to ${new_version_name} (code: ${new_version_code}) [skip ci]"

          if ! git push origin HEAD:main; then
            echo "::error::Failed to push version bump to main. If main is protected, allow GitHub Actions to bypass protection or switch this workflow to use a release PAT."
            exit 1
          fi

          tag_name="release/${new_version_name}"
          git tag "${tag_name}"
          git push origin "${tag_name}"

          {
            echo "version=${new_version_name}"
            echo "version_code=${new_version_code}"
            echo "tag_name=${tag_name}"
          } >> "${GITHUB_OUTPUT}"

  tracebox:
    name: Package Andy tracebox
    needs:
      - version
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag_name }}

      - name: Package pinned tracebox assets
        run: python3 tools/andy-tracebox/package_release.py --output release-artifacts

      - name: Upload tracebox artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tracebox-release
          if-no-files-found: error
          path: release-artifacts/*


  linux:
    name: Linux release
    needs:
      - version
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag_name }}

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot flatpak flatpak-builder xvfb libgtk-3-0 libxtst6 libxrender1 libxi6 libxrandr2
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install --noninteractive flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Linux packages
        run: >
          xvfb-run -a ./gradlew
          packageReleaseDeb
          createReleaseDistributable
          -Pandy.versionName=${{ needs.version.outputs.version }}

      - name: Build Linux Flatpak bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          (
            cd flatpak
            flatpak-builder \
              --force-clean \
              --repo="${GITHUB_WORKSPACE}/flatpak-repo" \
              "${GITHUB_WORKSPACE}/flatpak-build" \
              com.joetr.andy.yml
          )
          flatpak build-bundle \
            flatpak-repo \
            "release-artifacts/Andy-${VERSION}.flatpak" \
            com.joetr.andy \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo
        env:
          VERSION: ${{ needs.version.outputs.version }}

      - name: Collect Linux release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          deb="$(find build -name '*.deb' -print -quit)"
          if [[ -z "${deb}" ]]; then
            echo "::error::Could not find Linux DEB release artifact"
            exit 1
          fi
          flatpak_bundle="release-artifacts/Andy-${VERSION}.flatpak"
          if [[ ! -f "${flatpak_bundle}" ]]; then
            echo "::error::Could not find Linux Flatpak release artifact"
            exit 1
          fi
          cp "${deb}" "release-artifacts/Andy-${VERSION}.deb"
        env:
          VERSION: ${{ needs.version.outputs.version }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          if-no-files-found: error
          path: release-artifacts/*

  windows:
    name: Windows release
    needs:
      - version
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
      AZURE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
      AZURE_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_SIGNING_CERTIFICATE_PROFILE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag_name }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset --yes --no-progress

      - name: Validate Azure Artifact Signing settings
        shell: pwsh
        run: |
          $missing = @()
          if (-not $env:AZURE_CLIENT_ID) { $missing += "AZURE_CLIENT_ID" }
          if (-not $env:AZURE_TENANT_ID) { $missing += "AZURE_TENANT_ID" }
          if (-not $env:AZURE_SIGNING_ENDPOINT) { $missing += "AZURE_SIGNING_ENDPOINT" }
          if (-not $env:AZURE_SIGNING_ACCOUNT_NAME) { $missing += "AZURE_SIGNING_ACCOUNT_NAME" }
          if (-not $env:AZURE_SIGNING_CERTIFICATE_PROFILE_NAME) { $missing += "AZURE_SIGNING_CERTIFICATE_PROFILE_NAME" }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required Windows release secrets: $($missing -join ', ')"
            exit 1
          }

      - name: Build Windows MSI
        shell: pwsh
        run: ./gradlew.bat packageReleaseMsi "-Pandy.versionName=${{ needs.version.outputs.version }}"

      - name: Collect Windows release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "release-artifacts" | Out-Null
          $msi = Get-ChildItem -Path "build" -Recurse -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) {
            throw "Could not find Windows MSI release artifact"
          }
          Copy-Item $msi.FullName "release-artifacts/Andy-${env:VERSION}.msi"
        env:
          VERSION: ${{ needs.version.outputs.version }}

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Ensure PowerShell Gallery is registered
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              $repository = Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue
              if (-not $repository) {
                Register-PSRepository -Default
              }
              Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
              Get-PSRepository -Name PSGallery
              break
            } catch {
              if ($attempt -eq $maxAttempts) {
                throw
              }
              Write-Warning "Failed to configure PSGallery on attempt $attempt of $maxAttempts. Retrying in 10 seconds. $($_.Exception.Message)"
              Start-Sleep -Seconds 10
            }
          }

      - name: Sign Windows installer
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\release-artifacts
          files-folder-filter: msi
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          if-no-files-found: error
          path: release-artifacts/*

  macos:
    name: macOS release
    needs:
      - version
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_DEVELOPER_IDENTITY: ${{ secrets.MACOS_DEVELOPER_IDENTITY }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag_name }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate macOS signing secrets
        shell: bash
        run: |
          missing=()
          [[ -n "${MACOS_CERTIFICATE_BASE64}" ]] || missing+=("MACOS_CERTIFICATE_BASE64")
          [[ -n "${MACOS_CERTIFICATE_PASSWORD}" ]] || missing+=("MACOS_CERTIFICATE_PASSWORD")
          [[ -n "${MACOS_DEVELOPER_IDENTITY}" ]] || missing+=("MACOS_DEVELOPER_IDENTITY")
          [[ -n "${MACOS_KEYCHAIN_PASSWORD}" ]] || missing+=("MACOS_KEYCHAIN_PASSWORD")
          [[ -n "${APPLE_ID}" ]] || missing+=("APPLE_ID")
          [[ -n "${APPLE_APP_SPECIFIC_PASSWORD}" ]] || missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [[ -n "${APPLE_TEAM_ID}" ]] || missing+=("APPLE_TEAM_ID")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required macOS release secrets: ${missing[*]}"
            exit 1
          fi

      - name: Import macOS signing certificate
        shell: bash
        run: |
          cert_path="${RUNNER_TEMP}/developer-id.p12"
          keychain_path="${RUNNER_TEMP}/app-signing.keychain-db"
          echo "${MACOS_CERTIFICATE_BASE64}" | base64 --decode > "${cert_path}"

          security create-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" "${keychain_path}"
          security import "${cert_path}" -P "${MACOS_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${MACOS_KEYCHAIN_PASSWORD}" "${keychain_path}"

          jpackage_signing_identity="${MACOS_DEVELOPER_IDENTITY#Developer ID Application: }"
          jpackage_signing_identity="${jpackage_signing_identity#Developer ID Installer: }"
          jpackage_signing_identity="${jpackage_signing_identity#3rd Party Mac Developer Application: }"
          jpackage_signing_identity="${jpackage_signing_identity#3rd Party Mac Developer Installer: }"
          identity_list="$(security find-identity -v "${keychain_path}")"
          if ! grep -Fq "Developer ID Application: ${jpackage_signing_identity}" <<< "${identity_list}"; then
            echo "::error::MACOS_CERTIFICATE_BASE64 must include the Developer ID Application identity named by MACOS_DEVELOPER_IDENTITY"
            exit 1
          fi

          {
            echo "compose.desktop.mac.sign=true"
            echo "compose.desktop.mac.signing.identity=${jpackage_signing_identity}"
            echo "compose.desktop.mac.signing.keychain=${keychain_path}"
          } >> "${HOME}/.gradle/gradle.properties"

      - name: Build macOS DMG
        run: ./gradlew packageReleaseDmg -Pandy.versionName=${{ needs.version.outputs.version }}

      - name: Print macOS packaging logs
        if: failure()
        shell: bash
        run: |
          log_dir="build/compose/logs"
          if [[ ! -d "${log_dir}" ]]; then
            echo "No Compose packaging logs found."
            exit 0
          fi

          while IFS= read -r log_file; do
            echo "::group::${log_file}"
            sed -n '1,240p' "${log_file}"
            echo "::endgroup::"
          done < <(find "${log_dir}" -type f -name 'jpackage-*.txt' | sort)

      - name: Collect macOS release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          dmg="$(find build -name '*.dmg' -print -quit)"
          if [[ -z "${dmg}" ]]; then
            echo "::error::Could not find macOS DMG release artifact"
            exit 1
          fi
          cp "${dmg}" "release-artifacts/Andy-${VERSION}.dmg"
        env:
          VERSION: ${{ needs.version.outputs.version }}

      - name: Notarize macOS package
        shell: bash
        run: |
          set -euo pipefail
          mac_artifacts=()
          while IFS= read -r artifact; do
            mac_artifacts+=("${artifact}")
          done < <(find release-artifacts \( -name '*.dmg' -o -name '*.pkg' \) -print | sort)
          if (( ${#mac_artifacts[@]} == 0 )); then
            echo "::error::Could not find macOS artifacts to notarize"
            exit 1
          fi
          notary_credentials=(
            --apple-id "${APPLE_ID}"
            --password "${APPLE_APP_SPECIFIC_PASSWORD}"
            --team-id "${APPLE_TEAM_ID}"
          )
          max_notary_attempts=2
          for artifact in "${mac_artifacts[@]}"; do
            artifact_name="$(basename "${artifact}")"
            for attempt in $(seq 1 "${max_notary_attempts}"); do
              submit_log="${RUNNER_TEMP}/notarytool-submit-${artifact_name}-${attempt}.json"
              echo "Submitting ${artifact_name} for notarization (attempt ${attempt}/${max_notary_attempts})"
              if ! xcrun notarytool submit "${artifact}" \
                "${notary_credentials[@]}" \
                --wait \
                --output-format json > "${submit_log}"; then
                cat "${submit_log}" || true
                submission_id="$(plutil -extract id raw "${submit_log}" 2>/dev/null || true)"
                if [[ -n "${submission_id}" ]]; then
                  echo "::group::Notary log for ${artifact_name} attempt ${attempt}"
                  xcrun notarytool log "${submission_id}" "${notary_credentials[@]}" || true
                  echo "::endgroup::"
                fi
                if (( attempt < max_notary_attempts )); then
                  echo "::warning::Notarization command failed for ${artifact_name}; retrying in 30 seconds"
                  sleep 30
                  continue
                fi
                echo "::error::Notarization command failed for ${artifact_name}"
                exit 1
              fi
              cat "${submit_log}"
              submission_id="$(plutil -extract id raw "${submit_log}")"
              status="$(plutil -extract status raw "${submit_log}")"
              if [[ "${status}" == "Accepted" ]]; then
                xcrun stapler staple "${artifact}"
                continue 2
              fi
              echo "::group::Notary log for ${artifact_name} attempt ${attempt}"
              xcrun notarytool log "${submission_id}" "${notary_credentials[@]}" || true
              echo "::endgroup::"
              if (( attempt < max_notary_attempts )); then
                echo "::warning::Notarization failed for ${artifact_name} with status ${status}; retrying in 30 seconds"
                sleep 30
                continue
              fi
              echo "::error::Notarization failed for ${artifact_name} with status ${status}"
              exit 1
            done
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          if-no-files-found: error
          path: release-artifacts/*

  github-release:
    name: Create GitHub release
    needs:
      - version
      - linux
      - windows
      - macos
      - tracebox
    if: always() && needs.version.result == 'success' && needs.linux.result == 'success' && needs.windows.result == 'success' && needs.macos.result == 'success' && needs.tracebox.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag_name }}
          name: Andy ${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.deb
            release-artifacts/**/*.flatpak
            release-artifacts/**/*.msi
            release-artifacts/**/*.dmg
            release-artifacts/**/andy-tracebox
            release-artifacts/**/andy-tracebox-bin-*
            release-artifacts/**/andy-tracebox-SHA256SUMS
            release-artifacts/**/andy-tracebox-LICENSE.txt

  web:
    name: Web release
    needs:
      - version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag_name }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin Wasm Binaryen
        uses: actions/cache@v4
        with:
          path: ~/.gradle/binaryen
          key: ${{ runner.os }}-kotlin-wasm-binaryen-${{ hashFiles('build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-kotlin-wasm-binaryen-

      - name: Build web bundle
        run: ./gradlew wasmJsBrowserDistribution

      - name: Prepare GitHub Pages artifact
        shell: bash
        run: |
          touch build/dist/wasmJs/productionExecutable/.nojekyll
          cp build/dist/wasmJs/productionExecutable/index.html \
            build/dist/wasmJs/productionExecutable/404.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/dist/wasmJs/productionExecutable
          include-hidden-files: true

  web-pages-deploy:
    name: Deploy web to GitHub Pages
    needs:
      - web
    if: always() && needs.web.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.pages_url.outputs.page_url }}
    permissions:
      contents: read
      id-token: write
      pages: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
        with:
          timeout: 900000
          error_count: 20

      - name: Wait before retrying GitHub Pages deployment
        if: steps.deployment.outcome == 'failure'
        shell: bash
        run: sleep 30

      - name: Retry GitHub Pages deployment
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v5
        with:
          timeout: 900000
          error_count: 20

      - name: Set GitHub Pages deployment URL
        if: always()
        id: pages_url
        shell: bash
        env:
          PRIMARY_PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          RETRY_PAGE_URL: ${{ steps.deployment_retry.outputs.page_url }}
        run: |
          page_url="${RETRY_PAGE_URL:-${PRIMARY_PAGE_URL}}"
          if [[ -z "${page_url}" ]]; then
            echo "::error::GitHub Pages deployment did not produce a page URL"
            exit 1
          fi
          echo "page_url=${page_url}" >> "${GITHUB_OUTPUT}"
