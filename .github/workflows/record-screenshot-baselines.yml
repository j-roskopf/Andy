name: Record desktop screenshot baselines

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform whose renderer-specific baseline should be recorded
        required: true
        type: choice
        options:
          - linux
          - macos
          - windows

permissions:
  contents: read

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  record:
    name: Record ${{ inputs.platform }} baselines
    runs-on: ${{ inputs.platform == 'linux' && 'ubuntu-latest' || inputs.platform == 'macos' && 'macos-latest' || 'windows-latest' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Linux desktop dependencies
        if: inputs.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libxtst6 libxrender1 libxi6 libxrandr2

      - name: Record Linux baselines
        if: inputs.platform == 'linux'
        run: xvfb-run -a ./gradlew --rerun-tasks recordRoborazziDesktop

      - name: Record macOS baselines
        if: inputs.platform == 'macos'
        run: ./gradlew --rerun-tasks recordRoborazziDesktop

      - name: Record Windows baselines
        if: inputs.platform == 'windows'
        shell: pwsh
        run: ./gradlew.bat --rerun-tasks recordRoborazziDesktop

      - name: Upload recorded baselines
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-${{ inputs.platform }}-baselines
          path: src/screenshotTest/roborazzi/${{ inputs.platform }}/
          if-no-files-found: error

      - name: Upload Roborazzi report
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-${{ inputs.platform }}-report
          path: |
            build/reports/roborazzi/**
            build/test-results/roborazzi/**
